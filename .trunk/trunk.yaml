# This file controls the behavior of Trunk: https://docs.trunk.io/cli
# To learn more about the format of this file, see https://docs.trunk.io/reference/trunk-yaml
version: 0.1
cli:
  version: 1.25.0
# Trunk provides extensibility via plugins. (https://docs.trunk.io/plugins)
plugins:
  sources:
    - id: trunk
      ref: v1.10.2
      uri: https://github.com/trunk-io/plugins
# Many linters and tools depend on runtimes - configure them here. (https://docs.trunk.io/runtimes)
runtimes:
  enabled:
    - go@1.21.0
    - node@22.16.0
    - python@3.14.4
# This is the section where you manage your linters. (https://docs.trunk.io/check/configuration)
lint:
  ignore:
    - linters: [ALL]
      paths:
        - node_modules/**
        - .archive/**
        - build/**
  enabled:
    - actionlint@1.7.12
    - bandit@1.9.4
    - black@26.5.1
    - checkov@3.2.533
    - git-diff-check
    - grype@0.114.0
    - hadolint@2.14.0
    - isort@8.0.1
    - markdownlint@0.48.0
    - osv-scanner@2.3.8
    - pinact@4.0.0
    - prettier@3.8.3
    - ruff@0.15.16
    - shellcheck@0.11.0
    - shfmt@3.6.0
    - taplo@0.10.0
    - trufflehog@3.95.5
    - yamllint@1.38.0
  definitions:
    - name: bandit
      direct_configs:
        - .trunk/configs/.bandit
      commands:
        - name: lint
          run: bandit --ini ${workspace}/.trunk/configs/.bandit --format json --output ${tmpfile} ${target}
          # Tell trunk that exit code 1 just means issues were detected
          success_codes: [0, 1]
actions:
  enabled:
    - trunk-announce
    - trunk-check-pre-push
    - trunk-fmt-pre-commit
    - trunk-upgrade-available
